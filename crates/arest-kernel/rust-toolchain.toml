# crates/arest-kernel/rust-toolchain.toml
#
# The kernel crate needs nightly because x86-interrupt calling
# convention is nightly-only (`#![feature(abi_x86_interrupt)]`).
# Every x86_64 OS kernel in the rust-osdev ecosystem — the
# "Writing an OS in Rust" book, redox, blogos — runs on nightly
# for the same reason. The stable path to ring-0 handlers is
# writing the prologue/epilogue by hand in inline asm, which costs
# far more maintenance than the nightly pin.
#
# Stable builds of the arest library, arest-cli, and the rest of
# the workspace remain on stable — this pin is local to the kernel
# crate only.

[toolchain]
# Pinned to a known-good nightly (last verified 2026-04-21). Plain
# `nightly` drifts and the latest may break the kernel build (verified
# against the UEFI Docker pipeline). Bump intentionally after smoke-
# verifying all three UEFI targets + --features doom on the new date.
channel = "nightly-2026-04-21"
components = ["rust-src"]
targets = ["x86_64-unknown-uefi", "aarch64-unknown-uefi"]
