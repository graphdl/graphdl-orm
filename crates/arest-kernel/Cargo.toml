# crates/arest-kernel/Cargo.toml
#
# x86_64 bare-metal kernel for AREST. Builds for the stable built-in
# target `x86_64-unknown-none` (no std, no libc). Uses the rust-osdev
# `bootloader` crate to wrap the kernel into a bootable disk image —
# the bootloader handles Multiboot2 internally and hands the kernel a
# populated `BootInfo` at entry time.
#
# Build:
#   cargo build --release
# Run:
#   (follow-up commit — needs the bootloader image-builder task to
#   produce an .img and a qemu-system-x86_64 launch script)

[package]
name = "arest-kernel"
version = "0.1.0"
edition = "2021"
description = "AREST bare-metal kernel for x86_64"
license = "MIT"

[features]
# Enables the ring-3 smoke test boot path (Sec-6). When on, kernel_main
# short-circuits the REPL + HTTP init and descends to a hand-rolled
# ring-3 test payload that exercises the syscall gate, then halts via
# QEMU isa-debug-exit. When off (default), behavior is unchanged.
ring3-smoke = []
default = []

[[bin]]
name = "arest-kernel"
path = "src/main.rs"
test = false
bench = false

[dependencies]
# Public ABI with the bootloader crate. Just the trait / entry_point
# macro / BootInfo struct — no code that touches the host OS. Works
# on x86_64-unknown-none without any feature gymnastics.
bootloader_api = "0.11"
# 8250 / 16550 UART driver. Gives us a `SerialPort` struct with
# `core::fmt::Write` implemented — that's what lets `write!` and
# `writeln!` format directly into serial output.
uart_16550 = "0.3"
# Spin-based Mutex so SERIAL (the global SerialPort singleton) can
# be locked from any context including the panic handler. spin::Mutex
# never blocks the way std::sync::Mutex would; fine on bare metal.
spin = "0.9"
# Global allocator for `alloc` (Box / Vec / String / format!). The
# `LockedHeap` type is a spin-guarded linked-list free-list allocator
# that can be placed in a `static`. We initialise it from a fixed
# static-buffer heap in allocator::init() at boot. Once the bootloader
# memory map handling lands (#180) this will switch to a dynamic
# region picked from `BootInfo.memory_regions`.
linked_list_allocator = "0.10"
# Rust-osdev helpers for x86_64-specific structures — GDT, IDT, TSS,
# page-table flags, privilege rings. Small, no-alloc, no-std. Only
# pulls in the descriptor / interrupt plumbing; no scheduler or
# driver stack.
x86_64 = "0.15"
# Legacy 8259 PIC driver. Needed to route hardware IRQs (keyboard,
# timer) to IDT vectors — without PIC remap, the firmware-default
# IRQ 0-7 collide with CPU exception vectors 8-15 and a timer tick
# would fire the same vector as #DF.
pic8259 = "0.11"
# PS/2 keyboard decoder. Takes raw scancodes (set 1 by default on
# QEMU) and emits typed `DecodedKey` events — lets us ignore every
# detail of make/break codes and modifier tracking.
pc-keyboard = "0.7"
# smoltcp — pure-Rust, no_std TCP/UDP/ICMP/DHCP/DNS stack (#261).
# No C libs, no POSIX socket wrapper — just buffers, MAC/IP config,
# and a `Device` trait that a NIC driver implements. Vendor-neutral:
# backs Redox OS, several unikernels, Firecracker's MMDS. Feature
# set is pared to what an HTTP server over virtio-net needs:
#   medium-ethernet   — L2 framing for virtio-net
#   proto-ipv4        — L3 (v6 sits behind another feature)
#   proto-dhcpv4      — DHCPv4 client for DHCP lease acquisition
#   socket-tcp        — TCP listen sockets for the HTTP server
#   socket-udp        — UDP sockets for Doom multiplayer (#271)
smoltcp = { version = "0.12", default-features = false, features = [
    "alloc",
    "medium-ethernet",
    "proto-ipv4",
    "proto-dhcpv4",
    "socket-tcp",
    "socket-udp",
    "socket-dhcpv4",
] }
# rcore-os virtio-drivers (#262): pure-Rust no_std guest drivers for
# the full virtio device family (net, blk, gpu, input, console).
# Backs Redox, rCore, and Android's pKVM reference VMM. The crate
# requires a `Hal` impl (DMA alloc + virt/phys translation), which
# we provide via the bootloader's offset-mapped physical memory in
# `src/virtio.rs`. A PCI transport walker lights up virtio-net at
# boot once QEMU is launched with `-device virtio-net-pci,...`
# (tracked under #267).
virtio-drivers = "0.11"
# AREST engine — linked in `no_std` mode (default-features off,
# `no_std` feature on). Gives the kernel `ast::Object`, `ast::Func`,
# `ast::apply` and `freeze::thaw` so the HTTP handler (#265) can
# dispatch through the same ρ-application the worker uses, without
# pulling in the std-only compile / command / parse modules.
arest = { path = "../arest", default-features = false, features = ["no_std"] }

# wasmi — kept off the BIOS build. The crate compiles cleanly into
# `x86_64-unknown-none` but making it REACHABLE from `kernel_main`
# pulls in enough additional .text + relocations that the bootloader
# 0.11 BIOS-stage loader silently triple-faults before any println!
# runs. The fix is the UEFI path: UEFI firmware loads arbitrary
# PE32+ images without the bootloader-stage frame-allocator budget
# that the BIOS path operates under, so wasmi ships as a
# UEFI-target-only dep (below, under the target-specific block).

# UEFI target (#344) — uefi-rs gives us an `#[entry]` macro, Boot
# Services (serial, memory map, device discovery, framebuffer), and
# a panic handler. Only compiled for `x86_64-unknown-uefi` /
# `aarch64-unknown-uefi` builds; the BIOS path (`x86_64-unknown-none`)
# keeps using `bootloader_api` unchanged. `panic_handler` + `logger`
# features take the uefi-provided impls so we don't need an arch-
# specific one for the scaffold.
#
# wasmi — step 4d wave 5 (#270/#271). UEFI-only because the BIOS
# bootloader can't load a kernel image the wasmi runtime-including
# binary produces (verified via `5e8a15e` revert). UEFI firmware has
# no such size limit. `hash-collections` feature gives us
# hashbrown-backed tables for wasm's type / function tables without
# needing std. `no_std` default — we supply the `alloc` global.
[target.'cfg(target_os = "uefi")'.dependencies]
uefi = { version = "0.34", features = ["alloc", "panic_handler", "logger"] }
wasmi = { version = "0.50", default-features = false, features = ["hash-collections"] }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = 3
lto = "thin"
