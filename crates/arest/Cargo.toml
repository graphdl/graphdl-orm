# crates/arest/Cargo.toml
[package]
name = "arest"
version = "0.1.0"
edition = "2021"
description = "AREST engine: FORML2 parser, constraint compiler, evaluator, forward chainer, RMAP, and verbalization"
repository = "https://github.com/drivly/graphdl-orm"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "fol"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
wit-bindgen = { version = "0.41", default-features = false, features = ["macros"] }

[dev-dependencies]

[profile.release]
opt-level = "s"
lto = true
