# crates/arest/Cargo.toml
[package]
name = "arest"
version = "0.1.0"
edition = "2021"
description = "AREST engine: FORML2 parser, constraint compiler, evaluator, forward chainer, RMAP, and verbalization"
repository = "https://github.com/drivly/graphdl-orm"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "arest"
path = "src/main.rs"

[features]
default = ["wit", "debug-def"]
wit = ["dep:wit-bindgen"]
cloudflare = ["dep:wasm-bindgen"]
local = ["dep:rusqlite"]
# Gates the `debug` def which returns a full projection of the compiled
# state (nouns, fact types, constraints, state machines). Useful for test
# introspection but exposes internals in production — leave OFF for
# release builds. Enabled by default so `cargo test` works out of the box.
debug-def = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
wit-bindgen = { version = "0.41", default-features = false, features = ["macros"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
rusqlite = { version = "0.31", features = ["bundled"], optional = true }
hmac = "0.12"
sha2 = "0.10"
subtle = "2"

[dev-dependencies]

[profile.release]
opt-level = 2
lto = "thin"
