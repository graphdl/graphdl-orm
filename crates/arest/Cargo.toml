# crates/arest/Cargo.toml
[package]
name = "arest"
version = "0.1.0"
edition = "2021"
description = "AREST engine: FORML2 parser, constraint compiler, evaluator, forward chainer, RMAP, and verbalization"
repository = "https://github.com/drivly/graphdl-orm"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "fol"
path = "src/main.rs"

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
serde-wasm-bindgen = "0.6.5"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
